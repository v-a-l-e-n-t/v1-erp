name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}

      - name: Deploy dist to branch
        run: |
          # Sauvegarder le build dans un dossier temporaire
          cp -r dist /tmp/built-dist

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin

          # Supprimer le dossier dist local pour éviter le conflit avec la branche dist
          rm -rf dist

          # Checkout la branche dist (ou la créer en orphan si elle n'existe pas)
          if git show-ref --verify --quiet refs/remotes/origin/dist; then
            git checkout --track origin/dist
          else
            git checkout --orphan dist
            git rm -rf . --quiet 2>/dev/null || true
          fi

          # Vider le contenu actuel (sauf .git)
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} + 2>/dev/null || true

          # Copier les fichiers buildés
          cp -r /tmp/built-dist/. .

          git add -A
          if git diff --staged --quiet; then
            echo "Aucun changement à déployer"
          else
            git commit -m "deploy: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin dist
          fi

      - name: Trigger Hostinger auto-deploy
        run: |
          curl -X POST "${{ secrets.HOSTINGER_WEBHOOK_URL }}"
